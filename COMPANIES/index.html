<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Empresas</title>

  <!-- CSS universal -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="top-header">

  <!-- MENÚ DINÁMICO -->
  <nav class="header-left">
    <a href="about.html" class="intro-link">About</a>
    <div class="dropdown">
      <button class="dropdown-btn">Empresas ▾</button>
      <div id="menu-container" class="dropdown-content"></div>
    </div>
  </nav>

  <!-- LOGO + TÍTULO -->
  <div class="header-center">
    <span id="company-title"></span>
    <img id="company-logo" src="" alt="Logo">
  </div>

  <div class="header-right"></div>
</header>


<main class="company-main">

  <!-- HEADER DE LA EMPRESA -->
  <section class="company-header">
    <h1 id="company-name"></h1>
    <p class="company-subtitle">
      Summary of key financial indicators and quarterly performance.
    </p>
  </section>

  <!-- KPIs -->
  <section class="company-kpis">
    <h2>Key Performance Indicators</h2>
    <div id="kpi-container" class="kpi-grid"></div>
  </section>

  <!-- TABLA FINANCIERA -->
  <section class="company-table">
    <h2>Main Financial Results</h2>
    <table>
      <thead id="quarters-head"></thead>
      <tbody id="quarters-body"></tbody>
    </table>
  </section>

</main>

<!-- JS universal -->
<script src="js/menuLoader.js"></script>
<script src="js/loadCompany.js"></script>

</body>
</html>
